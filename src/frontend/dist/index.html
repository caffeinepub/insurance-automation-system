<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA primary meta -->
    <title>PB Insurance AI by Prashant</title>
    <meta name="description" content="Insurance Automation System – manage leads, policies and agents" />
    <meta name="theme-color" content="#1e3a5f" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/generated/pb-insurance-icon-192.dim_192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/generated/pb-insurance-icon-512.dim_512x512.png" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PB Insurance" />
    <link rel="apple-touch-icon" href="/assets/generated/pb-insurance-icon-192.dim_192x192.png" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PB Insurance" />

    <!-- Splash screen background on iOS (matches theme) -->
    <meta name="msapplication-navbutton-color" content="#1e3a5f" />
    <meta name="msapplication-starturl" content="/" />

    <!-- Prevent phone-number auto-detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Safe area padding for notched phones -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      html, body {
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* Splash screen shown before React hydrates */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #0f1b2e 0%, #1e3a5f 100%);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        margin-bottom: 20px;
      }
      #splash h1 {
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin: 0 0 4px;
        text-align: center;
        padding: 0 24px;
      }
      #splash p {
        color: rgba(255,255,255,0.5);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        margin: 0;
      }
      #splash .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: rgba(255,255,255,0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 28px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/assets/index-BLcmft9H.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DdjbZiCz.css">
  </head>
  <body>
    <!-- Native-feel splash screen -->
    <div id="splash">
      <img src="/assets/generated/pb-insurance-icon-192.dim_192x192.png" alt="PB Insurance" />
      <h1>PB Insurance AI by Prashant</h1>
      <p>Insurance Automation System</p>
      <div class="spinner"></div>
    </div>

    <div id="root"></div>

    <!-- Register service worker + hide splash when React is ready -->
    <script>
      // Register SW
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // Hide splash once React has mounted (root has children)
      const splash = document.getElementById('splash');
      const root = document.getElementById('root');
      const observer = new MutationObserver(() => {
        if (root && root.children.length > 0) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });

      // Fallback: hide after 3 s regardless
      setTimeout(() => {
        if (splash && splash.parentNode) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
        }
      }, 3000);
    </script>
  </body>
</html>
